name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deployment'
        required: false
        default: 'Manual trigger'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ROBOKASSA_LOGIN: ${{ secrets.ROBOKASSA_LOGIN }}
          ROBOKASSA_PASSWORD1: ${{ secrets.ROBOKASSA_PASSWORD1 }}
          ROBOKASSA_PASSWORD2: ${{ secrets.ROBOKASSA_PASSWORD2 }}
          ROBOKASSA_TEST_PASSWORD1: ${{ secrets.ROBOKASSA_TEST_PASSWORD1 }}
          ROBOKASSA_TEST_PASSWORD2: ${{ secrets.ROBOKASSA_TEST_PASSWORD2 }}
          ROBOKASSA_HASH_ALGO: ${{ secrets.ROBOKASSA_HASH_ALGO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          port: 22
          envs: POSTGRES_URL,JWT_SECRET,ROBOKASSA_LOGIN,ROBOKASSA_PASSWORD1,ROBOKASSA_PASSWORD2,ROBOKASSA_TEST_PASSWORD1,ROBOKASSA_TEST_PASSWORD2,ROBOKASSA_HASH_ALGO,SMTP_HOST,SMTP_PORT,SMTP_FROM
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            cd /var/www/myapp
            echo "=== Pulling latest code ==="
            git pull origin main
            echo "=== Writing .env ==="
            cat > .env <<EOF
            POSTGRES_URL=$POSTGRES_URL
            JWT_SECRET=$JWT_SECRET
            NODE_ENV=production
            APP_URL=https://www.esoterra.online
            ALLOWED_ORIGINS=https://www.esoterra.online
            RESET_OTP_EXPIRATION_MINUTES=10
            ROBOKASSA_LOGIN=$ROBOKASSA_LOGIN
            ROBOKASSA_PASSWORD1=$ROBOKASSA_PASSWORD1
            ROBOKASSA_PASSWORD2=$ROBOKASSA_PASSWORD2
            ROBOKASSA_TEST_PASSWORD1=$ROBOKASSA_TEST_PASSWORD1
            ROBOKASSA_TEST_PASSWORD2=$ROBOKASSA_TEST_PASSWORD2
            ROBOKASSA_HASH_ALGO=$ROBOKASSA_HASH_ALGO
            SMTP_HOST=$SMTP_HOST
            SMTP_PORT=$SMTP_PORT
            SMTP_FROM=$SMTP_FROM
            EOF
            echo "=== Installing dependencies ==="
            npm install --production
            echo "=== Restarting Node.js process ==="
            pm2 restart myapp
            echo "=== Verifying server is up ==="
            sleep 3
            curl -sf http://localhost:3001/api/health && echo "✅ Server OK" || echo "❌ Server health check failed"
            echo "=== Deploy complete ==="
