<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скоро — Ezotera</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <script src="js/header-loader.js"></script>
    <style>
        .coming-soon {
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }
        .coming-soon__inner {
            max-width: 480px;
        }
        .coming-soon__icon {
            font-size: 64px;
            margin-bottom: 24px;
            line-height: 1;
        }
        .coming-soon__title {
            font-family: var(--font-display);
            font-size: 2rem;
            color: var(--color-dark);
            margin-bottom: 16px;
        }
        .coming-soon__desc {
            color: var(--color-text-muted);
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 36px;
        }
        .coming-soon__actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }
    </style>
</head>
<body>
<main>
    <section class="coming-soon section--light">
        <div class="coming-soon__inner">
            <div class="coming-soon__icon">🔮</div>
            <h1 class="coming-soon__title">Появится скоро</h1>
            <p class="coming-soon__desc">
                Этот раздел находится в разработке и скоро будет доступен.<br>
                Пока вы можете воспользоваться другими возможностями Ezotera.
            </p>
            <div class="coming-soon__actions">
                <a href="index.html" class="button button--primary">На главную</a>
                <a href="pay.html" class="button button--secondary">Консультации</a>
            </div>
        </div>
    </section>
</main>

<footer></footer>
<script src="js/footer-loader.js"></script>
<script src="js/navigation.js"></script>
<script src="js/cookie-consent.js"></script>
</body>
</html>
