<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#152b35">
    <meta name="description" content="Энергетические браслеты Esoterra — подобранные по знаку зодиака. Натуральные камни для гармонии и силы.">
    <title>Браслеты — Esoterra</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <script src="js/header-loader.js"></script>

    <style>
        .shop-hero { background:var(--gradient-hero); padding:80px 0 60px; text-align:center; }
        .shop-hero__title { font-family:var(--font-heading); font-size:clamp(2rem,5vw,3rem); color:var(--color-white); margin-bottom:12px; }
        .shop-hero__sub { color:rgba(255,255,255,0.6); font-size:1.05rem; max-width:520px; margin:0 auto; }

        .shop-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:28px; padding:60px 0; }
        .shop-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:20px; overflow:hidden; transition:all 0.3s; display:flex; flex-direction:column; }
        .shop-card:hover { border-color:rgba(108,92,231,0.4); transform:translateY(-4px); box-shadow:0 12px 40px rgba(108,92,231,0.15); }
        .shop-card__img { width:100%; height:240px; object-fit:cover; background:#16162a; }
        .shop-card__body { padding:24px; flex:1; display:flex; flex-direction:column; }
        .shop-card__name { font-family:var(--font-heading); font-size:1.25rem; color:var(--color-white); margin-bottom:8px; }
        .shop-card__desc { font-size:0.88rem; color:rgba(255,255,255,0.6); line-height:1.6; margin-bottom:16px; flex:1; }
        .shop-card__footer { display:flex; justify-content:space-between; align-items:center; }
        .shop-card__price { font-size:1.3rem; font-weight:700; color:var(--color-white); }
        .shop-card__price small { font-size:0.8rem; font-weight:400; color:rgba(255,255,255,0.5); }
        .shop-card__buy { padding:10px 24px; background:var(--gradient-accent); color:#fff; border:none; border-radius:10px; font-family:inherit; font-size:0.9rem; cursor:pointer; transition:all 0.2s; }
        .shop-card__buy:hover { opacity:0.9; transform:scale(1.03); }
        .shop-card__buy:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
        .shop-card__out { color:rgba(255,255,255,0.4); font-size:0.85rem; }

        /* Order modal */
        .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:100; justify-content:center; align-items:center; }
        .modal-bg.active { display:flex; }
        .modal { background:#10101e; border:1px solid rgba(108,92,231,0.3); border-radius:20px; padding:36px; width:100%; max-width:440px; }
        .modal__title { font-family:var(--font-heading); font-size:1.3rem; color:var(--color-white); margin-bottom:8px; }
        .modal__product { font-size:0.9rem; color:rgba(255,255,255,0.5); margin-bottom:24px; }
        .modal__field { margin-bottom:16px; }
        .modal__field label { display:block; font-size:0.8rem; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px; }
        .modal__field input { width:100%; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15); border-radius:10px; color:#fff; padding:12px 16px; font-size:0.95rem; font-family:inherit; outline:none; }
        .modal__field input:focus { border-color:var(--color-accent); }
        .modal__actions { display:flex; gap:12px; margin-top:24px; }
        .modal__cancel { flex:1; padding:12px; background:transparent; border:1px solid rgba(255,255,255,0.15); border-radius:10px; color:rgba(255,255,255,0.6); font-family:inherit; font-size:0.9rem; cursor:pointer; }
        .modal__submit { flex:2; padding:12px; background:var(--gradient-accent); color:#fff; border:none; border-radius:10px; font-family:inherit; font-size:0.95rem; font-weight:600; cursor:pointer; }
        .modal__submit:disabled { opacity:0.5; cursor:not-allowed; }

        .shop-empty { text-align:center; padding:80px 20px; color:rgba(255,255,255,0.5); }
        .shop-loading { text-align:center; padding:60px; color:rgba(255,255,255,0.5); }

        .consent-box { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:14px 18px; margin-top:16px; display:flex; align-items:flex-start; gap:10px; }
        .consent-box input { margin-top:3px; flex-shrink:0; }
        .consent-box label { font-size:0.78rem; color:rgba(255,255,255,0.45); line-height:1.5; }
        .consent-box a { color:var(--color-accent-light); }
    </style>
</head>
<body>
    <main>
        <section class="shop-hero">
            <div class="container">
                <h1 class="shop-hero__title">Энергетические браслеты</h1>
                <p class="shop-hero__sub">Натуральные камни, подобранные по вашему знаку зодиака. Усильте свою энергию и гармонию.</p>
            </div>
        </section>

        <section class="section--dark" style="padding-bottom:80px;">
            <div class="container">
                <div id="shopContent" class="shop-loading">Загрузка товаров...</div>
            </div>
        </section>
    </main>

    <!-- Order Modal -->
    <div class="modal-bg" id="orderModal">
        <div class="modal">
            <h2 class="modal__title">Оформление заказа</h2>
            <p class="modal__product" id="modalProduct"></p>
            <form id="orderForm">
                <input type="hidden" id="ordProductId">
                <input type="hidden" id="ordAmount">
                <input type="hidden" id="ordDesc">
                <div class="modal__field">
                    <label>Ваше имя *</label>
                    <input type="text" id="ordName" required placeholder="Как к Вам обращаться?">
                </div>
                <div class="modal__field">
                    <label>Email *</label>
                    <input type="email" id="ordEmail" required placeholder="your@email.com">
                </div>
                <div class="consent-box">
                    <input type="checkbox" id="ordConsent" required>
                    <label for="ordConsent">
                        Нажимая «Оплатить», я принимаю условия
                        <a href="legal/oferta.html" target="_blank">Публичной оферты</a> и
                        <a href="legal/privacy.html" target="_blank">Политику конфиденциальности</a>.
                    </label>
                </div>
                <div class="modal__actions">
                    <button type="button" class="modal__cancel" onclick="closeOrderModal()">Отмена</button>
                    <button type="submit" class="modal__submit" id="payBtn">Оплатить</button>
                </div>
            </form>
        </div>
    </div>

    <footer></footer>
    <script src="js/footer-loader.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/cookie-consent.js"></script>

    <script>
    // Show payment status message
    (function() {
        var params = new URLSearchParams(window.location.search);
        var status = params.get('payment');
        if (status === 'success') {
            var msg = document.createElement('div');
            msg.style.cssText = 'background:rgba(0,184,148,0.15);border:1px solid rgba(0,184,148,0.3);border-radius:12px;padding:20px;text-align:center;color:#55efc4;margin:20px auto;max-width:600px;';
            msg.innerHTML = '<strong>Оплата прошла успешно!</strong><br><span style="color:rgba(255,255,255,0.6);font-size:0.9rem;">Спасибо за заказ. Мы свяжемся с Вами в ближайшее время.</span>';
            document.querySelector('.container').prepend(msg);
            window.history.replaceState({}, '', 'shop.html');
        } else if (status === 'failed' || status === 'error') {
            var msg = document.createElement('div');
            msg.style.cssText = 'background:rgba(255,118,117,0.15);border:1px solid rgba(255,118,117,0.3);border-radius:12px;padding:20px;text-align:center;color:#ff7675;margin:20px auto;max-width:600px;';
            msg.innerHTML = '<strong>Оплата не прошла</strong><br><span style="color:rgba(255,255,255,0.6);font-size:0.9rem;">Попробуйте снова или свяжитесь с нами.</span>';
            document.querySelector('.container').prepend(msg);
            window.history.replaceState({}, '', 'shop.html');
        }
    })();

    var products = [];
    var selectedProduct = null;

    // Load products from API
    fetch('/api/admin/products', { credentials: 'include' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            products = (data.products || []).filter(function(p) { return p.in_stock; });
            renderShop();
        })
        .catch(function() {
            document.getElementById('shopContent').innerHTML = '<div class="shop-empty">Не удалось загрузить товары. Попробуйте обновить страницу.</div>';
        });

    function renderShop() {
        var container = document.getElementById('shopContent');
        if (!products.length) {
            container.innerHTML = '<div class="shop-empty">Товары скоро появятся. Следите за обновлениями!</div>';
            return;
        }
        var html = '<div class="shop-grid">';
        products.forEach(function(p) {
            var img = p.image_url
                ? '<img class="shop-card__img" src="' + escHtml(p.image_url) + '" alt="' + escHtml(p.name) + '">'
                : '<div class="shop-card__img" style="display:flex;align-items:center;justify-content:center;font-size:3rem;">📿</div>';
            html += '<div class="shop-card">' +
                img +
                '<div class="shop-card__body">' +
                    '<h3 class="shop-card__name">' + escHtml(p.name) + '</h3>' +
                    '<p class="shop-card__desc">' + escHtml(p.description || '') + '</p>' +
                    '<div class="shop-card__footer">' +
                        '<span class="shop-card__price">' + Number(p.price).toLocaleString('ru-RU') + ' <small>₽</small></span>' +
                        '<button class="shop-card__buy" onclick="openOrder(' + p.id + ')">Купить</button>' +
                    '</div>' +
                '</div>' +
            '</div>';
        });
        html += '</div>';
        container.innerHTML = html;
    }

    function escHtml(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    function openOrder(productId) {
        selectedProduct = products.find(function(p) { return p.id === productId; });
        if (!selectedProduct) return;
        document.getElementById('modalProduct').textContent = selectedProduct.name + ' — ' + Number(selectedProduct.price).toLocaleString('ru-RU') + ' ₽';
        document.getElementById('ordProductId').value = selectedProduct.id;
        document.getElementById('ordAmount').value = selectedProduct.price;
        document.getElementById('ordDesc').value = selectedProduct.name + ' — Esoterra';
        document.getElementById('orderModal').classList.add('active');
    }

    function closeOrderModal() {
        document.getElementById('orderModal').classList.remove('active');
    }

    document.getElementById('orderModal').addEventListener('click', function(e) {
        if (e.target === this) closeOrderModal();
    });

    document.getElementById('orderForm').addEventListener('submit', function(e) {
        e.preventDefault();

        var name = document.getElementById('ordName').value.trim();
        var email = document.getElementById('ordEmail').value.trim();
        var consent = document.getElementById('ordConsent').checked;

        if (!name || !email) { alert('Заполните все поля'); return; }
        if (!consent) { alert('Необходимо принять условия'); return; }

        var btn = document.getElementById('payBtn');
        btn.disabled = true;
        btn.textContent = 'Создание заказа...';

        fetch('/api/payment/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({
                amount: document.getElementById('ordAmount').value,
                description: document.getElementById('ordDesc').value,
                customerName: name,
                customerEmail: email,
                productId: document.getElementById('ordProductId').value,
                isTest: false
            })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            btn.disabled = false;
            btn.textContent = 'Оплатить';
            if (data.success && data.paymentUrl) {
                window.location.href = data.paymentUrl;
            } else {
                alert(data.message || 'Ошибка создания заказа');
            }
        })
        .catch(function() {
            btn.disabled = false;
            btn.textContent = 'Оплатить';
            alert('Ошибка сервера. Попробуйте снова.');
        });
    });
    </script>
</body>
</html>
