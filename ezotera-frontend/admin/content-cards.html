<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контент-карточки | Esoterra Админ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Nunito',sans-serif; background:#0a0a14; color:#e8e0f0; min-height:100vh; }
        .admin { display:grid; grid-template-columns:240px 1fr; min-height:100vh; }
        .admin__sidebar { background:#10101e; border-right:1px solid rgba(130,80,220,0.2); padding:32px 20px; }
        .admin__logo { font-size:1.3rem; font-weight:700; color:#f9ca24; margin-bottom:32px; }
        .admin__logo span { color:#a090c0; font-weight:400; }
        .admin__nav { display:flex; flex-direction:column; gap:4px; }
        .admin__nav-link { display:flex; align-items:center; gap:10px; padding:12px 16px; border-radius:10px; color:#a090c0; text-decoration:none; font-size:0.95rem; transition:all 0.2s; }
        .admin__nav-link:hover, .admin__nav-link--active { background:rgba(130,80,220,0.15); color:#e8e0f0; }
        .admin__nav-link--active { border-left:3px solid #6c5ce7; }
        .admin__back { margin-top:auto; padding-top:24px; }
        .admin__back a { color:#a090c0; text-decoration:none; font-size:0.85rem; }
        .admin__back a:hover { color:#e8e0f0; }
        .admin__main { padding:32px 40px; overflow-y:auto; }
        .admin__header { display:flex; justify-content:space-between; align-items:center; margin-bottom:32px; flex-wrap:wrap; gap:12px; }
        .admin__title { font-size:1.5rem; font-weight:700; }
        .btn { padding:10px 24px; border-radius:10px; border:none; font-family:inherit; font-size:0.9rem; cursor:pointer; transition:all 0.2s; }
        .btn--primary { background:#6c5ce7; color:#fff; }
        .btn--primary:hover { background:#5a4bd6; }
        .btn--danger { background:rgba(220,53,69,0.2); color:#e05050; border:1px solid rgba(220,53,69,0.3); }
        .btn--danger:hover { background:rgba(220,53,69,0.35); }
        .btn--sm { padding:6px 14px; font-size:0.82rem; }

        /* Table */
        .cards-table { width:100%; border-collapse:collapse; margin-top:16px; }
        .cards-table th { text-align:left; padding:12px 16px; font-size:0.78rem; text-transform:uppercase; letter-spacing:0.05em; color:#a090c0; border-bottom:1px solid rgba(130,80,220,0.2); }
        .cards-table td { padding:12px 16px; border-bottom:1px solid rgba(130,80,220,0.1); font-size:0.9rem; }
        .cards-table tr:hover td { background:rgba(130,80,220,0.05); }
        .status-badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:0.75rem; font-weight:600; }
        .status-badge--active { background:rgba(85,239,196,0.15); color:#55efc4; }
        .status-badge--inactive { background:rgba(255,118,117,0.15); color:#ff7675; }
        .card-icon { font-size:1.3rem; }
        .actions { display:flex; gap:6px; }

        /* Modal */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100; justify-content:center; align-items:center; }
        .modal-overlay.active { display:flex; }
        .modal { background:#10101e; border:1px solid rgba(130,80,220,0.3); border-radius:20px; padding:36px; width:100%; max-width:560px; max-height:90vh; overflow-y:auto; }
        .modal__title { font-size:1.2rem; font-weight:700; margin-bottom:24px; }
        .form-group { margin-bottom:18px; }
        .form-group label { display:block; font-size:0.82rem; color:#a090c0; text-transform:uppercase; letter-spacing:0.04em; margin-bottom:6px; }
        .form-group input, .form-group textarea, .form-group select {
            width:100%; background:#16162a; border:1px solid rgba(130,80,220,0.25); border-radius:10px;
            color:#f0eaff; font-size:0.95rem; padding:12px 14px; outline:none; font-family:inherit;
            transition:border-color 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color:#6c5ce7; }
        .form-group textarea { resize:vertical; min-height:80px; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
        .form-actions { display:flex; gap:12px; justify-content:flex-end; margin-top:24px; }
        .toggle-wrap { display:flex; align-items:center; gap:10px; }
        .toggle { position:relative; width:48px; height:26px; }
        .toggle input { opacity:0; width:0; height:0; }
        .toggle__slider { position:absolute; inset:0; background:#2d2d44; border-radius:26px; cursor:pointer; transition:0.3s; }
        .toggle__slider:before { content:''; position:absolute; width:20px; height:20px; left:3px; bottom:3px; background:#a090c0; border-radius:50%; transition:0.3s; }
        .toggle input:checked + .toggle__slider { background:#6c5ce7; }
        .toggle input:checked + .toggle__slider:before { transform:translateX(22px); background:#fff; }
        .empty-state { text-align:center; padding:60px 20px; color:#a090c0; }
        #loading { text-align:center; padding:80px; color:#a090c0; }

        /* Toast */
        .toast { position:fixed; bottom:24px; right:24px; padding:14px 24px; border-radius:10px; font-size:0.9rem; display:none; z-index:200; color:#fff; }
        .toast.show { display:block; animation: fadeIn 0.3s; }
        .toast--success { background:#00b894; }
        .toast--error { background:#e05050; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

        @media(max-width:768px) {
            .admin { grid-template-columns:1fr; }
            .admin__sidebar { display:none; }
            .admin__main { padding:20px; }
            .cards-table { font-size:0.82rem; }
            .form-row { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>
    <div id="loading">Загрузка...</div>
    <div class="admin" id="adminPanel" style="display:none;">
        <aside class="admin__sidebar">
            <div class="admin__logo">Esoterra <span>Админ</span></div>
            <nav class="admin__nav">
                <a href="index.html" class="admin__nav-link"><span>📊</span> Главная</a>
                <a href="products.html" class="admin__nav-link"><span>📿</span> Браслеты</a>
                <a href="horoscope.html" class="admin__nav-link"><span>🔮</span> Гороскоп</a>
                <a href="referrals.html" class="admin__nav-link"><span>🔗</span> Реф. ссылки</a>
                <a href="content-cards.html" class="admin__nav-link admin__nav-link--active"><span>📰</span> Контент</a>
            </nav>
            <div class="admin__back"><a href="../index.html">← Вернуться на сайт</a></div>
        </aside>
        <main class="admin__main">
            <div class="admin__header">
                <h1 class="admin__title">Контент-карточки</h1>
                <button class="btn btn--primary" onclick="openModal()">+ Добавить карточку</button>
            </div>
            <div id="cardsContainer">
                <div class="empty-state">Загрузка карточек...</div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2 class="modal__title" id="modalTitle">Добавить карточку</h2>
            <form id="cardForm">
                <input type="hidden" id="cardId">
                <div class="form-group">
                    <label>Название *</label>
                    <input type="text" id="cTitle" required placeholder="Заголовок карточки">
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="cDesc" placeholder="Описание карточки..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Иконка (эмодзи)</label>
                        <input type="text" id="cIcon" placeholder="✨" maxlength="10">
                    </div>
                    <div class="form-group">
                        <label>Категория</label>
                        <select id="cCategory">
                            <option value="">-- Без категории --</option>
                            <option value="Гороскоп">Гороскоп</option>
                            <option value="Нумерология">Нумерология</option>
                            <option value="Зеркальные даты">Зеркальные даты</option>
                            <option value="Важные даты">Важные даты</option>
                            <option value="Число дня">Число дня</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Ссылка (URL)</label>
                    <input type="text" id="cLinkUrl" placeholder="https://...">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Текст ссылки</label>
                        <input type="text" id="cLinkText" placeholder="Подробнее">
                    </div>
                    <div class="form-group">
                        <label>Порядок сортировки</label>
                        <input type="number" id="cSort" min="0" value="0">
                    </div>
                </div>
                <div class="form-group">
                    <label>Статус</label>
                    <div class="toggle-wrap">
                        <label class="toggle">
                            <input type="checkbox" id="cActive" checked>
                            <span class="toggle__slider"></span>
                        </label>
                        <span id="cActiveLabel">Активна</span>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn--danger" onclick="closeModal()">Отмена</button>
                    <button type="submit" class="btn btn--primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
    var cards = [];

    // Auth check
    fetch('/api/auth/verify', { credentials: 'include' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            document.getElementById('loading').style.display = 'none';
            if (data.authenticated && data.user && data.user.role === 'admin') {
                document.getElementById('adminPanel').style.display = 'grid';
                loadCards();
            } else {
                document.body.innerHTML = '<div style="text-align:center;padding:80px;color:#a090c0;"><h2>Доступ запрещён</h2><p style="margin:16px 0;">У вас нет прав администратора.</p><a href="../index.html" style="color:#6c5ce7;">На главную</a></div>';
            }
        })
        .catch(function() {
            document.getElementById('loading').textContent = 'Ошибка авторизации';
        });

    function showToast(msg, type) {
        var toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = 'toast toast--' + (type || 'success') + ' show';
        setTimeout(function() { toast.className = 'toast'; }, 3000);
    }

    function loadCards() {
        fetch('/api/admin/content-cards', { credentials: 'include' })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                cards = data.cards || [];
                renderCards();
            })
            .catch(function() {
                document.getElementById('cardsContainer').innerHTML = '<div class="empty-state">Ошибка загрузки карточек</div>';
            });
    }

    function renderCards() {
        var container = document.getElementById('cardsContainer');
        if (!cards.length) {
            container.innerHTML = '<div class="empty-state">Карточек пока нет. Нажмите "+ Добавить карточку" чтобы начать.</div>';
            return;
        }
        var html = '<table class="cards-table"><thead><tr><th></th><th>Название</th><th>Категория</th><th>Статус</th><th>Порядок</th><th>Действия</th></tr></thead><tbody>';
        cards.forEach(function(c) {
            var statusClass = c.is_active ? 'status-badge--active' : 'status-badge--inactive';
            var statusText = c.is_active ? 'Активна' : 'Скрыта';
            html += '<tr>' +
                '<td class="card-icon">' + escHtml(c.icon || '✨') + '</td>' +
                '<td><strong>' + escHtml(c.title) + '</strong><br><small style="color:#a090c0;">' + escHtml((c.description || '').substring(0, 80)) + '</small></td>' +
                '<td>' + escHtml(c.category || '-') + '</td>' +
                '<td><span class="status-badge ' + statusClass + '">' + statusText + '</span></td>' +
                '<td>' + (c.sort_order || 0) + '</td>' +
                '<td class="actions"><button class="btn btn--primary btn--sm" onclick="editCard(' + c.id + ')">Ред.</button> <button class="btn btn--danger btn--sm" onclick="deleteCard(' + c.id + ')">Удалить</button></td>' +
                '</tr>';
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function openModal(card) {
        document.getElementById('modal').classList.add('active');
        if (card) {
            document.getElementById('modalTitle').textContent = 'Редактировать карточку';
            document.getElementById('cardId').value = card.id;
            document.getElementById('cTitle').value = card.title;
            document.getElementById('cDesc').value = card.description || '';
            document.getElementById('cIcon').value = card.icon || '✨';
            document.getElementById('cCategory').value = card.category || '';
            document.getElementById('cLinkUrl').value = card.link_url || '';
            document.getElementById('cLinkText').value = card.link_text || 'Подробнее';
            document.getElementById('cSort').value = card.sort_order || 0;
            document.getElementById('cActive').checked = card.is_active;
            updateActiveLabel();
        } else {
            document.getElementById('modalTitle').textContent = 'Добавить карточку';
            document.getElementById('cardForm').reset();
            document.getElementById('cardId').value = '';
            document.getElementById('cActive').checked = true;
            updateActiveLabel();
        }
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
    }

    function updateActiveLabel() {
        document.getElementById('cActiveLabel').textContent = document.getElementById('cActive').checked ? 'Активна' : 'Скрыта';
    }

    document.getElementById('cActive').addEventListener('change', updateActiveLabel);

    function editCard(id) {
        var c = cards.find(function(x) { return x.id === id; });
        if (c) openModal(c);
    }

    function deleteCard(id) {
        if (!confirm('Удалить эту карточку?')) return;
        fetch('/api/admin/content-cards', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ id: id })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.success) {
                showToast('Карточка удалена');
                loadCards();
            } else {
                showToast(data.message || 'Ошибка удаления', 'error');
            }
        })
        .catch(function() { showToast('Ошибка сервера', 'error'); });
    }

    document.getElementById('cardForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var id = document.getElementById('cardId').value;
        var payload = {
            title: document.getElementById('cTitle').value,
            description: document.getElementById('cDesc').value,
            icon: document.getElementById('cIcon').value || '✨',
            category: document.getElementById('cCategory').value,
            link_url: document.getElementById('cLinkUrl').value,
            link_text: document.getElementById('cLinkText').value || 'Подробнее',
            sort_order: document.getElementById('cSort').value,
            is_active: document.getElementById('cActive').checked
        };
        var method = id ? 'PUT' : 'POST';
        if (id) payload.id = parseInt(id);

        fetch('/api/admin/content-cards', {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify(payload)
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.success) {
                closeModal();
                showToast(id ? 'Карточка обновлена' : 'Карточка создана');
                loadCards();
            } else {
                showToast(data.message || 'Ошибка сохранения', 'error');
            }
        })
        .catch(function() { showToast('Ошибка сервера', 'error'); });
    });

    // Close modal on overlay click
    document.getElementById('modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });
    </script>
</body>
</html>
